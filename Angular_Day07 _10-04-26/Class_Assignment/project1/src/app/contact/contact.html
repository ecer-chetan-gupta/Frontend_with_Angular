<h1>CONTACT!</h1>
<h2>Form</h2>
<br />
<div class="example-container">
  <mat-form-field appearance="fill">
    <mat-label>Enter your email ID</mat-label>

    <input
      matInput
      placeholder="User@example.com"
      [formControl]="email"
      (blur)="updateErrorMessage()"
      required
    />

    @if (email.invalid) {
      <mat-error>{{ errorMessage() }}</mat-error>
    }
  </mat-form-field>
</div>
